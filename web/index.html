<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北海道クマ出没マップ | Bear Alert Hokkaido</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .title-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .title-card h1 {
            margin: 0;
            font-size: 1.2rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-card h1 span {
            color: var(--accent-orange);
        }

        .search-box {
            margin-top: 12px;
            pointer-events: auto;
        }

        .search-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 8px 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent-orange);
        }

        #alert-banner {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--accent-red);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            z-index: 2000;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #alert-banner.show {
            transform: translateY(0);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-fab {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            color: white;
            transition: all 0.2s;
        }

        .btn-fab:active {
            transform: scale(0.9);
            background: var(--accent-orange);
        }

        #bottom-sheet {
            position: fixed;
            bottom: -500px;
            left: 0;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            border-top: 1px solid var(--glass-border);
            z-index: 9999;
            padding: 24px;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 50vh;
            overflow-y: auto;
        }

        #bottom-sheet.show {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: -12px auto 16px auto;
        }

        .detail-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-orange);
        }

        .detail-meta {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .detail-desc {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-source {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
        }

        .user-location-marker {
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0); }
        }

        .caution-zone {
            stroke-dasharray: 8;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: 200; }
        }
    </style>
</head>
<body>

    <div id="alert-banner">⚠️ 警告：付近でクマの目撃情報があります。警戒してください。</div>

    <div class="header">
        <div class="title-card">
            <h1><span>BEAR</span> ALERT HOKKAIDO</h1>
            <div class="search-box">
                <input type="text" id="municipality-search" placeholder="市町村名で検索...">
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="btn-fab" id="btn-locate" title="現在地">📍</div>
        <div class="btn-fab" id="btn-refresh" title="データ更新">🔄</div>
    </div>

    <div id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div id="sheet-content">
            <div class="detail-title">情報を選択してください</div>
            <div class="detail-desc">マップ上のピンをタップすると詳細が表示されます。</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        const CAUTION_RADIUS = 500;
        const DATA_URL = '../data/sightings.json';

        let map, sightings = [], markers = [], userMarker, cautionCircles = [];

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            loadData();
            setupInteractions();
            startTracking();
        });

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.5, 142.5], 7); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
        }

        async function loadData() {
            try {
                const response = await fetch(`${DATA_URL}?t=${Date.now()}`);
                if (!response.ok) throw new Error('Data not found');
                sightings = await response.json();
                renderSightings(sightings);
            } catch (err) {
                console.error('Load failed:', err);
                if (window.location.protocol === 'file:') {
                    document.getElementById('sheet-content').innerHTML = `
                        <div style="color:#ef4444; font-weight:bold; margin-bottom:10px;">⚠️ データの読み込み制限</div>
                        <p style="font-size:0.9rem; line-height:1.5;">ブラウザの制限により、直接開くとデータを読み込めません。<br><br>
                        <strong>解決策:</strong><br>
                        1. GitHubにアップロードして公開する<br>
                        2. 付属の launch_map.bat で起動する</p>
                    `;
                    document.getElementById('bottom-sheet').classList.add('show');
                }
            }
        }

        function renderSightings(data) {
            markers.forEach(m => map.removeLayer(m));
            cautionCircles.forEach(c => map.removeLayer(c.circle));
            markers = []; cautionCircles = [];

            data.forEach(s => {
                const pinColor = s.type.includes('目撃') ? '#ef4444' : '#f59e0b';
                const marker = L.circleMarker([s.lat, s.lng], {
                    radius: 12, fillColor: pinColor, color: 'white', weight: 3, opacity: 1, fillOpacity: 0.9
                }).addTo(map);

                const circle = L.circle([s.lat, s.lng], {
                    radius: CAUTION_RADIUS, color: pinColor, weight: 1, fillColor: pinColor, fillOpacity: 0.1, className: 'caution-zone', interactive: false
                }).addTo(map);

                cautionCircles.push({ circle, data: s });
                markers.push(marker);
                marker.on('click', (e) => { L.DomEvent.stop(e); showDetails(s); });
            });
        }

        function showDetails(s) {
            const dateStr = new Date(s.datetime).toLocaleString('ja-JP');
            document.getElementById('sheet-content').innerHTML = `
                <div class="detail-title">${s.address}</div>
                <div class="detail-meta"><span>🕒 ${dateStr}</span><span>📍 ${s.type}</span></div>
                <div class="detail-desc">${s.description}</div>
                <a href="${s.source_url}" target="_blank" class="btn-source">出典元：${s.source_name} ↗</a>
            `;
            document.getElementById('bottom-sheet').classList.add('show');
            map.flyTo([s.lat, s.lng], 14);
        }

        function setupInteractions() {
            map.on('click', () => document.getElementById('bottom-sheet').classList.remove('show'));
            document.getElementById('btn-locate').onclick = () => {
                if (userMarker) map.flyTo(userMarker.getLatLng(), 15);
                else if (sightings.length > 0) map.flyTo([sightings[0].lat, sightings[0].lng], 10);
            };
            document.getElementById('btn-refresh').onclick = () => loadData();
            document.getElementById('municipality-search').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = sightings.filter(s => s.address.toLowerCase().includes(term) || s.description.toLowerCase().includes(term));
                renderSightings(filtered);
                if (filtered.length > 0 && term.length > 1) map.flyTo([filtered[0].lat, filtered[0].lng], 11);
            };
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                // 初回のみ少し待つ案内を出す
                const banner = document.getElementById('alert-banner');
                
                navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;

                    console.log(`Current accuracy: ${accuracy}m`);

                    // 精度が低すぎる（500m以上）場合は無視する（オプション）
                    if (accuracy > 500) return;
                    
                    if (!userMarker) {
                        const icon = L.divIcon({ className: 'user-location-marker', iconSize: [12, 12] });
                        userMarker = L.marker([lat, lng], { icon }).addTo(map);
                        // 初回取得時にのみ、ユーザーの場所へズーム（任意）
                        // map.flyTo([lat, lng], 15);
                    } else {
                        userMarker.setLatLng([lat, lng]);
                    }
                    checkAlerts(lat, lng);
                }, (err) => {
                    console.error("GPS Error:", err);
                }, { 
                    enableHighAccuracy: true, // 高精度モードを強制
                    timeout: 10000,           // 10秒でタイムアウト
                    maximumAge: 0             // キャッシュを使わない
                });
            }
        }

        function checkAlerts(userLat, userLng) {
            let inZone = false;
            cautionCircles.forEach(item => { if (map.distance([userLat, userLng], item.circle.getLatLng()) < CAUTION_RADIUS) inZone = true; });
            document.getElementById('alert-banner').classList.toggle('show', inZone);
        }
    </script>
</body>
</html>
